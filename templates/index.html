<h2>History</h2>

<table border="1">
    <tr>
        <th>ID</th>
        <th>Num1</th>
        <th>Num2</th>
        <th>Operation</th>
        <th>Result</th>
        <th>Actions</th>
    </tr>

    {% for row in data %}
    <tr>
        <td>{{ row[0] }}</td>
        <td>{{ row[1] }}</td>
        <td>{{ row[2] }}</td>
        <td>{{ row[3] }}</td>

        <td>
            <form action="/update/{{ row[0] }}" method="POST">
                <input type="text" name="result" value="{{ row[4] }}">
                <button type="submit">Update</button>
            </form>
        </td>

        <td>
            <a href="/delete/{{ row[0] }}">Delete</a>
        </td>
    </tr>
    {% endfor %}
</table>
